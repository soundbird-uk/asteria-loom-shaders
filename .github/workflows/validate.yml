name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: Compile gate (glslang, all profiles)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install glslang + zip
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools zip

      - name: Validate shaders (all profiles x all programs, all targets)
        # --target all compiles each program under three Iris-macro paths:
        #   mac      — M4 path, GL 4.1, no IRIS_FEATURE_* (AL_ADVANCED_TIER off)
        #   mac-hw   — M4 path + IRIS_FEATURE_SEPARATE_HARDWARE_SAMPLERS only
        #              (Apple Silicon reports this non-GL4.2 feature, so the M4
        #              takes the hardware-PCSS branch UNDER MC_OS_MAC)
        #   advanced — MC_OS_WINDOWS, GL 4.6, all four IRIS_FEATURE_* on
        # Sources stay `#version 330 compatibility`, so this validates branch
        # selection across the real platform combinations, not GL 4.6 syntax.
        run: python3 tools/validate.py --target all

      - name: Package installable zip
        run: python3 tools/package.py --version ci

      - name: Upload pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: asteria-loom-pack
          path: dist/*.zip
          if-no-files-found: error
