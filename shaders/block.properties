# ============================================================================
# ASTERIA LOOM — block.properties
# ----------------------------------------------------------------------------
# Maps block IDs into the mc_Entity.x attribute so shaders can discriminate
# specific blocks. Iris/OptiFine syntax: `block.<id> = <namespaced blocks...>`.
# The <id> is an arbitrary integer the shader compares mc_Entity.x against.
#
# Phase 4 (WATER): ALL translucent terrain (stained glass, ice, slime, honey,
# nether portal, ...) is drawn by gbuffers_water in Iris — the terrain fallback
# only applies when the water program is ABSENT. Without a way to tell real
# water apart, the water shader would blue-green-tint glass, Fresnel-override
# its alpha, and give it SSR. So we tag water with a sentinel ID (10001); the
# water shader treats ONLY mc_Entity.x == 10001 as water and passes everything
# else through as an ordinary forward-lit translucent. IDs are chosen high to
# avoid any collision with future block tags.
# ============================================================================

block.10001 = minecraft:water minecraft:flowing_water
