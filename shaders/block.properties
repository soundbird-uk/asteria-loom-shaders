# ============================================================================
# ASTERIA LOOM — block.properties
# ----------------------------------------------------------------------------
# Maps block IDs into the mc_Entity.x attribute so shaders can discriminate
# specific blocks. Iris/OptiFine syntax: `block.<id> = <namespaced blocks...>`.
# The <id> is an arbitrary integer the shader compares mc_Entity.x against.
#
# Phase 4 (WATER): ALL translucent terrain (stained glass, ice, slime, honey,
# nether portal, ...) is drawn by gbuffers_water in Iris — the terrain fallback
# only applies when the water program is ABSENT. Without a way to tell real
# water apart, the water shader would blue-green-tint glass, Fresnel-override
# its alpha, and give it SSR. So we tag water with a sentinel ID (10001); the
# water shader treats ONLY mc_Entity.x == 10001 as water and passes everything
# else through as an ordinary forward-lit translucent. IDs are chosen high to
# avoid any collision with future block tags.
# ============================================================================

block.10001 = minecraft:water minecraft:flowing_water

# ---- Foliage wind (Phase 4.3, ISSUE 5) -------------------------------------
# Foliage the terrain vertex shader (lib/wind.glsl) animates. Two classes so the
# shader can sway grass MORE than leaves and flutter leaves subtly:
#   10010 = grass / small plants / crops / vines (strong lapping sway, anchored
#           base via at_midBlock so bases stay put)
#   10020 = leaves (subtle flutter + slight branch movement)
# IDs are high to avoid collision with future tags; unmapped blocks default to 0
# (no sway). Block base names track vanilla 1.20+ (grass -> short_grass rename is
# covered by listing BOTH).
block.10010 = minecraft:grass minecraft:short_grass minecraft:tall_grass minecraft:fern minecraft:large_fern \
  minecraft:dandelion minecraft:poppy minecraft:blue_orchid minecraft:allium minecraft:azure_bluet \
  minecraft:red_tulip minecraft:orange_tulip minecraft:white_tulip minecraft:pink_tulip minecraft:oxeye_daisy \
  minecraft:cornflower minecraft:lily_of_the_valley minecraft:wither_rose minecraft:torchflower \
  minecraft:sunflower minecraft:lilac minecraft:rose_bush minecraft:peony minecraft:pink_petals \
  minecraft:wheat minecraft:carrots minecraft:potatoes minecraft:beetroots minecraft:sweet_berry_bush \
  minecraft:nether_wart minecraft:sugar_cane minecraft:vine minecraft:cave_vines minecraft:cave_vines_plant \
  minecraft:weeping_vines minecraft:weeping_vines_plant minecraft:twisting_vines minecraft:twisting_vines_plant \
  minecraft:seagrass minecraft:tall_seagrass minecraft:kelp minecraft:kelp_plant minecraft:hanging_roots \
  minecraft:crimson_roots minecraft:warped_roots minecraft:nether_sprouts minecraft:spore_blossom \
  minecraft:big_dripleaf minecraft:small_dripleaf minecraft:pitcher_plant \
  minecraft:oak_sapling minecraft:birch_sapling minecraft:spruce_sapling minecraft:jungle_sapling \
  minecraft:acacia_sapling minecraft:dark_oak_sapling minecraft:cherry_sapling minecraft:mangrove_propagule
block.10020 = minecraft:oak_leaves minecraft:birch_leaves minecraft:spruce_leaves minecraft:jungle_leaves \
  minecraft:acacia_leaves minecraft:dark_oak_leaves minecraft:mangrove_leaves minecraft:cherry_leaves \
  minecraft:pale_oak_leaves minecraft:azalea_leaves minecraft:flowering_azalea_leaves

# ---- Emissive light sources (Phase 4.4) ------------------------------------
# Light-emitting blocks. deferred1 adds self-illumination from each block's OWN
# texture colour (redstone torch -> red glow, torch -> orange, glowstone -> yellow,
# lava -> orange), and bloom spreads that colour as a halo — a screen-space
# approximation of coloured light (true voxel-propagated colour needs the
# compute/GL4.3 advanced tier, which the macOS GL4.1 path cannot run).
block.10040 = minecraft:torch minecraft:wall_torch minecraft:soul_torch minecraft:soul_wall_torch \
  minecraft:redstone_torch minecraft:redstone_wall_torch minecraft:redstone_lamp \
  minecraft:lantern minecraft:soul_lantern minecraft:jack_o_lantern minecraft:campfire minecraft:soul_campfire \
  minecraft:fire minecraft:soul_fire minecraft:glowstone minecraft:sea_lantern minecraft:shroomlight \
  minecraft:end_rod minecraft:lava minecraft:magma_block minecraft:beacon minecraft:conduit \
  minecraft:ochre_froglight minecraft:verdant_froglight minecraft:pearlescent_froglight \
  minecraft:crying_obsidian minecraft:respawn_anchor minecraft:sea_pickle minecraft:glow_lichen \
  minecraft:lit_furnace minecraft:blast_furnace minecraft:smoker minecraft:lit_pumpkin
