# ============================================================================
# ASTERIA LOOM — shaders.properties
# ----------------------------------------------------------------------------
# Pipeline configuration, presets (profiles) and settings screens. All tunable
# option DEFINES live in settings.glsl; this file only wires them into the GUI
# and the five presets. Every option referenced here exists in settings.glsl,
# appears in exactly one screen below, and has lang/en_us.lang entries.
# ============================================================================

# ---- Capability gating (future-proofing; nothing uses these in Phase 1) ----
# Iris emits IRIS_FEATURE_<NAME> for each supported flag; the advanced tier
# (Phase 6) combines them with !MC_OS_MAC. Declaring them now is harmless and
# keeps the single-codebase contract intact.
iris.features.optional = COMPUTE_SHADERS SSBO CUSTOM_IMAGES SEPARATE_HARDWARE_SAMPLERS

# ---- Pipeline flags --------------------------------------------------------
# Hybrid deferred translucents: draw entities separately so they compose right.
separateEntityDraws = true
# Shadows use the SOFTWARE manual-compare path: shadowtex0/1 stay PLAIN depth
# textures (raw `.r` read + in-shader `step` compare + Vogel PCF, with the PCSS
# blocker search reading the same raw depth). This is the field-proven-correct
# 0.1.1 approach and behaves IDENTICALLY on Windows and macOS — no platform-
# divergent hardware-sampler semantics. Hardware shadow filtering is therefore
# OFF; the experimental compare-sampler path (lib/shadow.glsl, AL_SHADOW_HW in
# settings.glsl — off by default, it caused the 0.2.x zero-shadow/over-shadow
# field regressions) is the only thing that would need this set true.
shadowHardwareFiltering = false

# ---- Per-buffer blend overrides (MAJOR-2 review fix) -----------------------
# gbuffers_water is an MRT: colortex0 (draw buffer 0) = forward-lit surface,
# blended over the scene as usual; colortex2 (draw buffer 1) = surface normal +
# lightmap; colortex3 (draw buffer 2) = matID. Vanilla alpha-blend state applies
# to EVERY MRT draw buffer, which would corrupt the aux writes: the matID stored
# as alpha*encode(id) decodes to the WRONG id at low surface alpha (straight-down
# water alpha ~0.39 -> decodes to TERRAIN, killing SSR/absorption/caustics on the
# most common view), and octahedral normals blend nonlinearly into garbage.
# Disabling blend on draw buffers 1 and 2 (the RENDERTARGETS positions of
# colortex2/3) makes those writes AUTHORITATIVE OVERWRITES while colortex0 keeps
# blending. Iris form: `blend.<program>.<drawBufferIndex> = off`.
# Buffer identifier must be a NAME (colortexN or legacy gcolor/gdepth/...), never
# a bare draw-buffer index — Iris resolves the token via LEGACY_RENDER_TARGETS
# then the colortexN pattern and hard-fails ("Failed to parse buffer blend!
# index = -1") on anything else, killing the whole pack load. Verified against
# ShaderProperties.java. These disable blending on the water pass's auxiliary
# G-buffer writes (surface normal/lightmap + matID) so they land verbatim;
# colortex0 keeps normal alpha blending.
blend.gbuffers_water.colortex2 = off
blend.gbuffers_water.colortex3 = off

# gbuffers_textured forward-writes colortex0 (so post-deferred overlays — item
# frames, sign text, banner patterns — are composited into the scene). When such
# an overlay is alpha-blended, keep its aux G-buffer writes authoritative so the
# matID/normal land verbatim; colortex0 keeps blending.
blend.gbuffers_textured.colortex1 = off
blend.gbuffers_textured.colortex2 = off
blend.gbuffers_textured.colortex3 = off

# ---- Buffer clearing -------------------------------------------------------
# colortex5 is the AO temporal-history buffer: it must PERSIST across frames so
# the GTAO pass can reproject into last frame's result. Everything else clears
# normally (colortex4 clears to 0 each frame — the AO pass rewrites it in full).
clear.colortex5 = false
# colortex6 is the sky-view LUT tile. It is fully rebaked by the prepare pass
# every frame (fragments outside the 256x128 tile discard), so it need never be
# cleared; leaving it uncleared avoids a full-buffer clear each frame. Its reads
# are NaN-proof range-validated so the undefined first frame can't leak.
clear.colortex6 = false
# colortex7 is the volumetric-cloud history (rgb = in-scattered radiance, a =
# transmittance). It must PERSIST for temporal accumulation, so it is not
# cleared; the composite pass reprojects last frame's result from it. Its reads
# are NaN-proof range-validated so the undefined first frame self-heals.
clear.colortex7 = false
# colortex8 is the TAA history (rgb = resolved colour, a = blend confidence). It
# MUST PERSIST across frames so composite3 can reproject last frame's resolved
# image, so it is not cleared. Its reads are NaN-proof range-validated (the
# undefined first frame on Apple GL self-heals to "current frame only").
clear.colortex8 = false

# ---- Program gating --------------------------------------------------------
# POTATO turns SHADOWS off, which skips the shadow pass entirely (real perf win,
# not just a #define).
program.shadow.enabled = SHADOWS
# The `deferred` pass is now GTAO; gate it on AO so POTATO/LOW skip it entirely
# (real perf win). deferred1 (lighting) falls back to AO=1.0 via `#ifdef AO`.
program.deferred.enabled = AO
# NOTE: clouds are gated INSIDE gbuffers_clouds.fsh (`#ifndef VANILLA_CLOUDS
# discard`), NOT via program.enabled. Disabling the program would make Iris
# fall back to gbuffers_textured for cloud geometry (bypassing the guard and
# leaking cloud silhouettes into the G-buffer/depth), so we must let the
# dedicated clouds program run and self-discard.
# composite1 is aerial-perspective fog; gate it on AERIAL_FOG so turning fog off
# skips the pass entirely (real perf win). With it disabled colortex0 from
# composite passes straight through to final unchanged — no separate copy pass
# is needed. Every profile keeps AERIAL_FOG on (the pass is trivially cheap).
program.composite2.enabled = AERIAL_FOG
# composite4 is the bloom downsample tile chain; gate it on BLOOM so POTATO (and
# anyone turning bloom off) skips building the atlas entirely (real perf win).
# composite5 still runs (auto-exposure); its bloom-combine is `#ifdef BLOOM`.
program.composite4.enabled = BLOOM

# ---- Particle ordering -----------------------------------------------------
# Render ALL particles AFTER the deferred pass. The G-buffer is dead post-
# deferred, so gbuffers_particles is a FORWARD-LIT program writing colortex0
# (see its header). `after` keeps every particle on that single forward path;
# `mixed` would split opaque particles before deferred and need G-buffer
# handling too. Keep this consistent with the forward particles program.
particles.ordering = after

# ============================================================================
# PROFILES (presets)
# ----------------------------------------------------------------------------
# Each preset is FULLY EXPLICIT: it sets EVERY feature it differentiates, on or
# off. This is deliberate — Iris profiles only change the options they list, so a
# preset that relied on defaults for (say) SSR/BLOOM/GOD_RAYS would leave them
# OFF after the user had ever been on POTATO (which disables them), i.e. picking
# ULTRA would NOT turn them back on. Listing every feature makes switching presets
# deterministic from any prior state. Ascending quality POTATO -> ULTRA.
# ============================================================================
profile.POTATO = !SHADOWS !SHADOW_PCSS SHADOW_SAMPLES=8 shadowMapResolution=1024 !CONTACT_SHADOWS !AO AO_QUALITY=1 !VOLUMETRIC_CLOUDS VANILLA_CLOUDS VC_QUALITY=1 !SSR SSR_QUALITY=1 WATER_WAVES !WATER_CAUSTICS !REFLECTIVE_BLOCKS !BLOOM !GOD_RAYS AERIAL_FOG AA_MODE=1
profile.LOW = SHADOWS !SHADOW_PCSS SHADOW_SAMPLES=8 shadowMapResolution=1536 !CONTACT_SHADOWS !AO AO_QUALITY=1 !VOLUMETRIC_CLOUDS VANILLA_CLOUDS VC_QUALITY=1 SSR SSR_QUALITY=1 WATER_WAVES WATER_CAUSTICS !REFLECTIVE_BLOCKS BLOOM !GOD_RAYS AERIAL_FOG AA_MODE=1
profile.MEDIUM = SHADOWS SHADOW_PCSS SHADOW_SAMPLES=12 shadowMapResolution=2048 !CONTACT_SHADOWS AO AO_QUALITY=2 VOLUMETRIC_CLOUDS !VANILLA_CLOUDS VC_QUALITY=1 SSR SSR_QUALITY=2 WATER_WAVES WATER_CAUSTICS REFLECTIVE_BLOCKS BLOOM GOD_RAYS AERIAL_FOG AA_MODE=1
profile.HIGH = SHADOWS SHADOW_PCSS SHADOW_SAMPLES=16 shadowMapResolution=2048 CONTACT_SHADOWS AO AO_QUALITY=3 VOLUMETRIC_CLOUDS !VANILLA_CLOUDS VC_QUALITY=2 SSR SSR_QUALITY=2 WATER_WAVES WATER_CAUSTICS REFLECTIVE_BLOCKS BLOOM GOD_RAYS AERIAL_FOG AA_MODE=1
profile.ULTRA = SHADOWS SHADOW_PCSS SHADOW_SAMPLES=24 shadowMapResolution=3072 CONTACT_SHADOWS AO AO_QUALITY=3 VOLUMETRIC_CLOUDS !VANILLA_CLOUDS VC_QUALITY=3 SSR SSR_QUALITY=3 WATER_WAVES WATER_CAUSTICS REFLECTIVE_BLOCKS BLOOM GOD_RAYS AERIAL_FOG AA_MODE=1

# ============================================================================
# SCREENS
# Top-level screen lists the sub-screens. Every option lives in exactly one.
# ============================================================================
screen = <profile> <empty> [LIGHTING] [SHADOWS] [AO] [SKY] [CLOUDS] [FOG] [WATER] [POST] [DEBUG]

screen.LIGHTING = SUN_INTENSITY AMBIENT_INTENSITY BLOCKLIGHT_INTENSITY BLOCKLIGHT_TINT NIGHT_BRIGHTNESS BOUNCE_INTENSITY
screen.SHADOWS  = SHADOWS SHADOW_PCSS SHADOW_SAMPLES shadowMapResolution shadowDistance CONTACT_SHADOWS
screen.AO       = AO AO_QUALITY AO_STRENGTH
screen.SKY      = SKY_BRIGHTNESS SUNMOON_BRIGHTNESS MIE_STRENGTH TURBIDITY SUN_DISC_SIZE SUN_DISC_BRIGHTNESS NIGHT_SKY STARS_DENSITY AURORA END_BLACKHOLE_SIZE
screen.CLOUDS   = VOLUMETRIC_CLOUDS VC_QUALITY VC_COVERAGE CLOUD_SPEED VANILLA_CLOUDS
screen.FOG      = AERIAL_FOG FOG_DENSITY <empty> FOG_START_CHUNKS FOG_WALL_CHUNKS FOG_PATCHINESS
screen.WATER    = SSR SSR_QUALITY WATER_WAVES WATER_CAUSTICS <empty> REFLECTIVE_BLOCKS REFLECTIVE_STRENGTH
screen.POST     = BLOOM BLOOM_STRENGTH GOD_RAYS GODRAY_STRENGTH EXPOSURE AA_MODE
screen.DEBUG    = DEBUG_VIEW

# ---- Numeric options rendered as sliders (rather than click-cycle) ---------
sliders = SUN_INTENSITY AMBIENT_INTENSITY BLOCKLIGHT_INTENSITY NIGHT_BRIGHTNESS BOUNCE_INTENSITY SHADOW_SAMPLES shadowMapResolution shadowDistance AO_QUALITY AO_STRENGTH SKY_BRIGHTNESS SUNMOON_BRIGHTNESS MIE_STRENGTH TURBIDITY SUN_DISC_SIZE SUN_DISC_BRIGHTNESS STARS_DENSITY END_BLACKHOLE_SIZE VC_QUALITY VC_COVERAGE CLOUD_SPEED FOG_DENSITY FOG_START_CHUNKS FOG_WALL_CHUNKS FOG_PATCHINESS SSR_QUALITY REFLECTIVE_STRENGTH BLOOM_STRENGTH GODRAY_STRENGTH EXPOSURE DEBUG_VIEW
