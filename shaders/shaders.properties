# ============================================================================
# ASTERIA LOOM — shaders.properties
# ----------------------------------------------------------------------------
# Pipeline configuration, presets (profiles) and settings screens. All tunable
# option DEFINES live in settings.glsl; this file only wires them into the GUI
# and the five presets. Every option referenced here exists in settings.glsl,
# appears in exactly one screen below, and has lang/en_us.lang entries.
# ============================================================================

# ---- Capability gating (future-proofing; nothing uses these in Phase 1) ----
# Iris emits IRIS_FEATURE_<NAME> for each supported flag; the advanced tier
# (Phase 6) combines them with !MC_OS_MAC. Declaring them now is harmless and
# keeps the single-codebase contract intact.
iris.features.optional = COMPUTE_SHADERS SSBO CUSTOM_IMAGES SEPARATE_HARDWARE_SAMPLERS

# ---- Pipeline flags --------------------------------------------------------
# Hybrid deferred translucents: draw entities separately so they compose right.
separateEntityDraws = true
# PCSS uses hardware shadow filtering. With the SEPARATE_HARDWARE_SAMPLERS
# feature flag, plain shadowtex0/1 stay raw-readable (blocker search) and
# shadowtex0HW/1HW give hardware PCF (verified: Iris ShaderDoc iris-features.md,
# "Separate Hardware Shadow Samplers"). Without the flag, this makes plain
# shadowtex1 a compare sampler — lib/shadow.glsl detects that and falls back to
# a fixed-radius Vogel PCF (no blocker search). Both paths compile on Mac GL4.1.
shadowHardwareFiltering = true

# ---- Program gating --------------------------------------------------------
# POTATO turns SHADOWS off, which skips the shadow pass entirely (real perf win,
# not just a #define).
program.shadow.enabled = SHADOWS
# NOTE: clouds are gated INSIDE gbuffers_clouds.fsh (`#ifndef VANILLA_CLOUDS
# discard`), NOT via program.enabled. Disabling the program would make Iris
# fall back to gbuffers_textured for cloud geometry (bypassing the guard and
# leaking cloud silhouettes into the G-buffer/depth), so we must let the
# dedicated clouds program run and self-discard.

# ---- Particle ordering -----------------------------------------------------
# Render ALL particles AFTER the deferred pass. The G-buffer is dead post-
# deferred, so gbuffers_particles is a FORWARD-LIT program writing colortex0
# (see its header). `after` keeps every particle on that single forward path;
# `mixed` would split opaque particles before deferred and need G-buffer
# handling too. Keep this consistent with the forward particles program.
particles.ordering = after

# ============================================================================
# PROFILES (presets)
# Shadow differentiators: SHADOWS, shadowMapResolution, SHADOW_PCSS,
# SHADOW_SAMPLES, CONTACT_SHADOWS. (AO / TAA / clouds / SSR layer on later.)
# ============================================================================
profile.POTATO = !SHADOWS !CONTACT_SHADOWS shadowMapResolution=1024 VANILLA_CLOUDS
profile.LOW    = SHADOWS !SHADOW_PCSS SHADOW_SAMPLES=8 !CONTACT_SHADOWS shadowMapResolution=1536 VANILLA_CLOUDS
profile.MEDIUM = SHADOWS SHADOW_PCSS SHADOW_SAMPLES=12 !CONTACT_SHADOWS shadowMapResolution=2048 VANILLA_CLOUDS
profile.HIGH   = profile.MEDIUM SHADOW_SAMPLES=16 CONTACT_SHADOWS
profile.ULTRA  = profile.HIGH SHADOW_SAMPLES=24 shadowMapResolution=3072

# ============================================================================
# SCREENS
# Top-level screen lists the sub-screens. Every option lives in exactly one.
# ============================================================================
screen = [LIGHTING] [SHADOWS] [SKY] [POST] [DEBUG]

screen.LIGHTING = SUN_INTENSITY AMBIENT_INTENSITY BLOCKLIGHT_INTENSITY BLOCKLIGHT_TINT NIGHT_BRIGHTNESS BOUNCE_INTENSITY
screen.SHADOWS  = SHADOWS SHADOW_PCSS SHADOW_SAMPLES shadowMapResolution shadowDistance CONTACT_SHADOWS
screen.SKY      = VANILLA_CLOUDS SKY_BRIGHTNESS SUNMOON_BRIGHTNESS
screen.POST     = EXPOSURE
screen.DEBUG    = DEBUG_VIEW

# ---- Numeric options rendered as sliders (rather than click-cycle) ---------
sliders = SUN_INTENSITY AMBIENT_INTENSITY BLOCKLIGHT_INTENSITY NIGHT_BRIGHTNESS BOUNCE_INTENSITY SHADOW_SAMPLES shadowMapResolution shadowDistance SKY_BRIGHTNESS SUNMOON_BRIGHTNESS EXPOSURE DEBUG_VIEW
